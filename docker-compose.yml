version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: meetingmate-mysql
    restart: always
    environment:
      MYSQL_DATABASE: meetingmate
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_USER: meetingmate
      MYSQL_PASSWORD: meetingmate123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./meetingmate
    container_name: meetingmate-backend
    restart: always
    depends_on:
      - mysql
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/meetingmate
      SPRING_DATASOURCE_USERNAME: meetingmate
      SPRING_DATASOURCE_PASSWORD: meetingmate123
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./meetingmate_front/meetingmate_frontend
    container_name: meetingmate-frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    container_name: meetingmate-nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data: