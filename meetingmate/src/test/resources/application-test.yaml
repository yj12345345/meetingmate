spring:
  config:
    activate:
      on-profile: test
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
  datasource:
    url: jdbc:h2:mem:meetingmate;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  frontend-redirect-url: http://localhost:5173/oauth/callback

openai:
  api-key: test-key
  model: gpt-4o-mini
