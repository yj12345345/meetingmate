<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시작하기</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: #f7f8fa;
      color: #111827;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(480px, calc(100vw - 32px));
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    p {
      margin: 0 0 16px;
      color: #4b5563;
      font-size: 14px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      height: 44px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    button {
      margin-top: 12px;
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>키워드를 입력하세요</h1>
    <p>입력 후 결과 보기 버튼을 누르면 추천 페이지로 이동합니다.</p>

    <input id="keywordInput" type="text" placeholder="예: 서울맛집" />
    <button id="resultButton" type="button" disabled>결과 보기</button>
  </main>

  <script>
    const keywordInput = document.getElementById("keywordInput");
    const resultButton = document.getElementById("resultButton");

    const updateButtonState = () => {
      const keyword = keywordInput.value.trim();
      resultButton.disabled = keyword.length === 0;
    };

    keywordInput.addEventListener("input", updateButtonState);

    resultButton.addEventListener("click", () => {
      const keyword = keywordInput.value.trim();
      if (!keyword) return;
      window.location.href = `/recommend?keyword=${encodeURIComponent(keyword)}`;
    });
  </script>
</body>
</html>
